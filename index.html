<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دقيقة الترشيد - جامعة مدينة السادات الأهلية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a227;
    --gold-light: #f0c040;
    --gold-dark: #8a6a00;
    --teal: #0a7c6e;
    --teal-light: #12a898;
    --dark: #06130f;
    --white: #f5f0e8;
  }
@keyframes titleGlow {
  0% { text-shadow: 0 0 0px var(--gold); opacity: 0; }
  50% { text-shadow: 0 0 40px var(--gold-light); opacity: 0.8; }
  100% { text-shadow: 0 0 15px rgba(201,162,39,0.3); opacity: 1; }
}

.header-title {
  animation: titleGlow 2s ease-out forwards, pulseGlow 3s ease infinite;
}
  /* 1. حركة الأيقونة داخل الكارت */
.sentence-icon {
  font-size: 5rem;
  display: inline-block;
  animation: floating 3s ease-in-out infinite;
}

@keyframes floating {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

/* 2. تأثير احترافي لأسماء الطلاب عند مرور الماوس */
.student-item {
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  cursor: default;
}

.student-item:hover {
  transform: scale(1.1) translateY(-5px);
  background: rgba(201, 162, 39, 0.2) !important;
  box-shadow: 0 10px 20px rgba(201, 162, 39, 0.3);
  border-color: var(--gold-light) !important;
}

/* 3. إضافة "وهج" خلفي للموقع بالكامل */
.bg-canvas::after {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(201,162,39,0.05) 0%, transparent 50%);
  animation: rotateBg 20s linear infinite;
  z-index: -1;
}

@keyframes rotateBg {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    /* اتأكد إن الاسم هنا هو نفس اسم الصورة اللي رفعتها */
    background: url('bg.jpg') no-repeat center center fixed; 
    background-size: cover;
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* طبقة تعتيم فوق الصورة لضمان وضوح الكلام */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(6, 19, 15, 0.8); 
    z-index: -1;
  }

  .bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(10, 42, 30, 0.5) 0%, transparent 80%);
  }

  .particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--gold-light);
    opacity: 0;
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-50px) translateX(30px); opacity: 0; }
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1000px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 50px;
    animation: fadeDown 1s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-img {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    box-shadow: 0 0 30px rgba(201,162,39,0.4);
    background: white;
    padding: 5px;
  }

  .header-title {
    font-family: 'Tajawal', sans-serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), #fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: pulseGlow 3s ease infinite;
  }

  @keyframes pulseGlow {
    0%, 100% { text-shadow: 0 0 10px rgba(201,162,39,0.3); }
    50% { text-shadow: 0 0 25px rgba(201,162,39,0.6); }
  }

  .header-sub {
    font-size: 1.1rem;
    color: var(--teal-light);
    font-weight: 500;
    letter-spacing: 2px;
  }

  /* Slider Container */
  .slider-container {
    max-width: 650px;
    margin: 50px auto;
    text-align: center;
    position: relative;
  }

  .sentence-card {
    min-height: 300px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(10, 124, 110, 0.2); 
    backdrop-filter: blur(15px);
    border: 2px solid var(--gold);
    border-radius: 30px;
    padding: 50px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    animation: cardEntrance 0.7s cubic-bezier(0.17, 0.67, 0.83, 0.67) both;
    transition: all 0.4s ease; /* ضيف ده */
    transform-style: preserve-3d; /* وضيف ده */
  }

  @keyframes cardEntrance {
    from { opacity: 0; transform: scale(0.8) translateY(30px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .sentence-num {
    color: var(--gold);
    font-weight: 800;
    letter-spacing: 2px;
    display: block;
  }

  .sentence-text {
    font-size: 1.8rem;
    font-weight: 600;
    margin: 30px 0;
    line-height: 1.5;
  }

  .sentence-icon {
    font-size: 5rem;
  }

  .next-btn {
    margin-top: 40px;
    padding: 15px 60px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--dark);
    border: none;
    border-radius: 50px;
    font-family: 'Tajawal', sans-serif;
    font-weight: 900;
    font-size: 1.3rem;
    cursor: pointer;
    transition: 0.3s all ease;
    box-shadow: 0 15px 25px rgba(201, 162, 39, 0.4);
    animation: buttonPulse 2s infinite;
  }
@keyframes buttonPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(201, 162, 39, 0.7); }
  100% { transform: scale(1); }
}
  .next-btn:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 20px 35px rgba(201, 162, 39, 0.6);
  }

  /* Team Section */
  .team-section {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(5px);
    border: 1px solid rgba(201,162,39,0.2);
    border-radius: 20px;
    padding: 40px;
    margin-top: 60px;
  }

  .students-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
    margin-top: 20px;
  }

  .student-item {
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    font-size: 0.9rem;
    text-align: center;
  }

  .footer-bar {
    margin-top: 50px;
    text-align: center;
    font-size: 0.8rem;
    color: rgba(201,162,39,0.5);
  }
  
  /* التعديل الخاص بالموبايل */
  @media (max-width: 768px) {
    .wrapper {
      padding: 20px 10px; /* تقليل المسافات الجانبية */
    }

    .header-title {
      font-size: 2rem; /* تصغير حجم العنوان */
    }

    .slider-container {
      max-width: 95%; /* الكارت ياخد عرض الشاشة كلها تقريباً */
      margin: 20px auto;
    }

    .sentence-card {
      min-height: 220px;
      padding: 25px 20px; /* تقليل الحشو الداخلي */
      border-radius: 20px;
    }

    .sentence-text {
      font-size: 1.2rem !important; /* تصغير الخط عشان ميبقاش طويل وعريض */
      margin: 15px 0;
    }

    .sentence-icon {
      font-size: 3rem !important; /* تصغير الأيقونة شوية */
    }

    .next-btn {
      width: 100%; /* الزرار يبقى بعرض الكارت لسهولة الضغط */
      padding: 12px;
      font-size: 1.1rem;
    }

    .team-section {
      padding: 20px;
    }

    .students-grid {
      grid-template-columns: repeat(2, 1fr); /* الأسماء تظهر في عمودين بدل ما تبقى زحمة */
    }
  }
  /* تأثير احترافي لأسماء الطلاب عند مرور الماوس (Neon Glow) */
.student-item {
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  background: rgba(255, 255, 255, 0.03) !important;
  border: 1px solid rgba(201, 162, 39, 0.3) !important;
}

.student-item:hover {
  transform: scale(1.08) translateY(-5px);
  background: rgba(201, 162, 39, 0.15) !important;
  box-shadow: 0 0 20px rgba(201, 162, 39, 0.4);
  border-color: var(--gold-light) !important;
  color: var(--gold-light);
}

/* أنيميشن تبديل الكروت (3D Flip Effect) */
.sentence-card {
  transition: all 0.5s ease-in-out;
  transform-style: preserve-3d;
}

.card-flip {
  transform: rotateX(90deg) scale(0.8);
  opacity: 0;
}

/* أنيميشن الأيقونات الطائرة داخل الكارت */
.sentence-icon {
  display: inline-block;
  animation: floatingIcon 3s ease-in-out infinite;
}

@keyframes floatingIcon {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-15px) rotate(10deg); }
}

/* وهج متحرك خلفي للموقع (Animated Background Glow) */
.bg-canvas::after {
  content: '';
  position: fixed;
  top: -50%; left: -50%; width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(201,162,39,0.06) 0%, transparent 50%);
  animation: bgRotate 20s linear infinite;
  z-index: -1;
}

@keyframes bgRotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="bg-canvas"></div>
<div class="particles" id="particles"></div>

<div class="wrapper">
  <div class="header">
    <img class="logo-img" src="logo.jpg" alt="شعار الجامعة">
    <h1 class="header-title" style="margin-top:20px;">دقيقة الترشيد</h1>
    <p class="header-sub">جامعتنا واعية ... طاقتنا أمننا</p>
  </div>

  <div class="slider-container">
    <div id="activeSentence">
      </div>
    <button class="next-btn" onclick="showNext()">النصيحة التالية ✦</button>
  </div>

<div class="team-section">
    <h2 style="text-align:center; color:var(--gold); margin-bottom:25px; font-family:'Tajawal'; letter-spacing: 1px;">✦ فريق العمل المبدع ✦</h2>
    
    <div class="students-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 650px; margin: 0 auto;">
        
        <div class="student-item" style="border: 2px solid var(--gold); padding: 15px; font-weight: 800; font-size: 1.1rem; border-radius: 15px; background: rgba(255,255,255,0.03); color: var(--white);">
          👨‍💻 محمد عبد الحميد سليمه
        </div>
        
        <div class="student-item" style="border: 2px solid var(--gold); padding: 15px; font-weight: 800; font-size: 1.1rem; border-radius: 15px; background: rgba(255,255,255,0.03); color: var(--white);">
          👨‍💻 حمزة السيد ناشي
        </div>
        
        <div class="student-item" style="border: 2px solid var(--gold); padding: 15px; font-weight: 800; font-size: 1.1rem; border-radius: 15px; background: rgba(255,255,255,0.03); color: var(--white);">
          👨‍💻 شهاب هاني شاهين
        </div>
        
        <div class="student-item" style="border: 2px solid var(--gold); padding: 15px; font-weight: 800; font-size: 1.1rem; border-radius: 15px; background: rgba(255,255,255,0.03); color: var(--white);">
          👨‍💻 مصعب احمد ابو حديد
        </div>
        
    </div>
</div>
    
  </div> <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; margin-top: 50px; padding: 20px 0; border-top: 1px solid rgba(201,162,39,0.2); clear: both;">
        <p style="font-size: 1rem; color: #12a898; font-weight: bold; margin: 5px 0; text-align: center;">مدير البرامج: دكتور / خالد الكلاني</p>
        <p style="font-size: 1rem; color: #12a898; font-weight: bold; margin: 5px 0; text-align: center;"> منسقة النشاط: دكتورة / علياء محمد</p>
    </div>
    </div>
  </div>

  <div class="footer-bar">NUSC · كلية العلوم · جامعة مدينة السادات الأهلية ⚡</div>
</div>

<script>
// الجزيئات المتطايرة
const particlesContainer = document.getElementById('particles');
for (let i = 0; i < 25; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (Math.random() * 10 + 8) + 's';
  p.style.animationDelay = (Math.random() * 10) + 's';
  particlesContainer.appendChild(p);
}

// البيانات
const sentences = [
  { text: "ترشيد الطاقة يُقلل الفواتير ويوفر المال لمشاريع أهم.", icon: "💰" },
  { text: "إطفاء الأنوار عند الخروج عادةٌ صغيرة بأثر عظيم.", icon: "💡" },
  { text: "ترشيد الطاقة يحمي كوكبنا من الاحترار العالمي.", icon: "🌍" },
  { text: "الاقتصاد في استهلاك الكهرباء دليل وعي واهتمام.", icon: "🏫" },
  { text: "كل كيلو واط توفره يُسهم في تقليل انبعاثات الكربون.", icon: "🌿" },
  { text: "الطاقة الموفرة اليوم تُضاء بها مدارس الغد.", icon: "🔋" },
  { text: "ضبط درجة التكييف على 24°م يوفر نصف الاستهلاك.", icon: "❄️" },
  { text: "أجهزة التكنولوجيا الموفرة تُعمر أطول وتكلف أقل.", icon: "💻" },
  { text: "الوعي بالطاقة مسؤولية وطنية يبدأ بها كل فرد.", icon: "🇪🇬" },
  { text: "استخدام الإضاءة الطبيعية يُغني عن الكهرباء ويُصح البصر.", icon: "☀️" },
  { text: "فصل الأجهزة عن الكهرباء كليًا يوقف الاستهلاك الخفي.", icon: "🔌" },
  { text: "الترشيد ليس تقشفًا، بل هو ذكاء في إدارة الموارد.", icon: "🧠" },
  { text: "طالب العلم الواعي يُعلم أسرته فضائل توفير الطاقة.", icon: "👨‍👩‍👧" },
  { text: "الطاقة المتجددة تبدأ بترشيد ما لدينا قبل إنتاج الجديد.", icon: "⚡" },
  { text: "معًا نبني جامعةً مستدامة تصون المستقبل.", icon: "🤝" },
];

let currentIndex = 0;

function updateCard() {
  const s = sentences[currentIndex];
  const container = document.getElementById('activeSentence');
  const num = String(currentIndex + 1).padStart(2, '0');
  
  container.innerHTML = `
    <div class="sentence-card">
      <span class="sentence-num">✦ نصيحة رقم ${num} ✦</span>
      <p class="sentence-text">${s.text}</p>
      <div class="sentence-icon">${s.icon}</div>
    </div>
  `;
}
function showNext() {
  const container = document.getElementById('activeSentence');
  const card = container.querySelector('.sentence-card');
  
  // 1. الكارت يميل ويختفي (الحركة بتبدأ هنا)
  card.style.transform = "rotateX(90deg)";
  card.style.opacity = "0";
  
  setTimeout(() => {
    // 2. بنغير النص وهو الكارت "واقف" بالعرض فمش بيبان التغيير المفاجئ
    currentIndex = (currentIndex + 1) % sentences.length;
    updateCard();
    
    // 3. بنجيب الكارت الجديد ونجهزه مائل عشان يعدل نفسه
    const newCard = document.getElementById('activeSentence').querySelector('.sentence-card');
    newCard.style.transition = "none"; 
    newCard.style.transform = "rotateX(-90deg)";
    newCard.style.opacity = "0";
    
    setTimeout(() => {
      // 4. الكارت يرجع لوضعه الطبيعي (الحركة بتخلص هنا)
      newCard.style.transition = "all 0.4s ease-out";
      newCard.style.transform = "rotateX(0deg)";
      newCard.style.opacity = "1";
    }, 50);
    
  }, 400); // 400 مللي ثانية هي مدة النص الأول من الحركة
}

// عرض أول كارت عند التحميل
updateCard();
</script>
</body>
</html>
